name: iOS IPA Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to create/update when publishing a manual GitHub Release (for example, v1.0.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Archive app for generic iOS device
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project OnDeviceAIIDE.xcodeproj \
            -scheme OnDeviceAIIDE \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/OnDeviceAIIDE.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/OnDeviceAIIDE.xcarchive/Products/Applications/OnDeviceAIIDE.app"
          test -d "$APP_PATH"
          rm -rf build/Payload build/OnDeviceAIIDE.ipa
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry OnDeviceAIIDE.ipa Payload)
          shasum -a 256 build/OnDeviceAIIDE.ipa | tee build/OnDeviceAIIDE.ipa.sha256

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnDeviceAIIDE-unsigned-ipa
          path: |
            build/OnDeviceAIIDE.ipa
            build/OnDeviceAIIDE.ipa.sha256
          if-no-files-found: error

      - name: Attach IPA to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: OnDeviceAIIDE ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            build/OnDeviceAIIDE.ipa
            build/OnDeviceAIIDE.ipa.sha256
          generate_release_notes: true
