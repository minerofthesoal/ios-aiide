name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  static-contract-tests:
    name: Static contract tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run static contract tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

  swift-compile-smoke:
    name: Swift/iOS compile smoke
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Swift syntax smoke compile
        run: |
          set -euo pipefail
          find OnDeviceAIIDE -name '*.swift' -print0 | xargs -0 -n 1 swiftc -parse-as-library -parse
