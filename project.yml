name: OnDeviceAIIDE
options:
  bundleIdPrefix: com.ondeviceaiide
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  OnDeviceAIIDE:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OnDeviceAIIDE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ondeviceaiide.app
        PRODUCT_NAME: OnDeviceAIIDE
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: OnDevice AI IDE
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    info:
      path: generated/Info.plist
      properties:
        CFBundleDisplayName: OnDevice AI IDE
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
